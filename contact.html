<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo"><i class="fas fa-terminal"></i> CAMARA.dev</div>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">À propos</a></li>
                    <li><a href="Entreprise.html">Parcours Pro</a></li>

                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h1>Me Contacter</h1>
        
        <div class="grid-2">
            <section class="card">
                <h3><i class="fas fa-paper-plane"></i> Envoyer un message</h3>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Nom Complet</label>
                        <input type="text" id="name" required placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="votre@email.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" rows="5" required placeholder="Bonjour..."></textarea>
                    </div>
                    <button type="submit" class="btn">Envoyer</button>
                </form>
            </section>

            <section>
                <div class="card" style="margin-bottom: 1.5rem;">
                    <h3><i class="fas fa-envelope"></i> Email</h3>
                    <p>o.camara@ecole-ipssi.net</p>
                    <p>oussenecamara717@gmail.com</p>
                </div>
                <div class="card" style="margin-bottom: 1.5rem;">
                    <h3><i class="fas fa-phone"></i> Téléphone</h3>
                    <p>+33 6 41 05 84 23</p>
                </div>
                <div class="card">
                    <h3><i class="fab fa-linkedin"></i> Réseaux</h3>
                    <a href="https://linkedin.com/in/oussenecamara" target="_blank" class="btn" style="width:100%; text-align:center;">LinkedIn</a>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 • CAMARA Oussene • BTS SIO SISR</p>
    </footer>

    <script src="assets/js/script.js"></script>
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Merci ! Votre message a été simulé (Ceci est un portfolio statique).");
            this.reset();
        });
    </script>
</body>
</html>
